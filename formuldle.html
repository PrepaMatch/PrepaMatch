<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formuldle</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root {
  --bg:#0c0e1a; --surface:#13161f; --surface2:#191d2c; --surface3:#1e2235;
  --chalk:#eae6da; --chalk-dim:#6b6759; --chalk-mid:#a8a399;
  --green:#3dba77; --green-bg:rgba(61,186,119,.13); --green-bd:rgba(61,186,119,.45);
  --yellow:#d4a843; --yellow-bg:rgba(212,168,67,.13); --yellow-bd:rgba(212,168,67,.45);
  --red:#e05252; --red-bg:rgba(224,82,82,.13); --red-bd:rgba(224,82,82,.45);
  --blue:#5b9bd5; --blue-bg:rgba(91,155,213,.10); --blue-bd:rgba(91,155,213,.4);
  --purple:#9b7fd4; --purple-bg:rgba(155,127,212,.10); --purple-bd:rgba(155,127,212,.4);
  --orange:#d4763b; --orange-bg:rgba(212,118,59,.10); --orange-bd:rgba(212,118,59,.4);
  --border:#1e2235; --border2:#272d42;
  --r:12px; --rs:8px;
  /* mode accent — overridden per mode */
  --accent:var(--blue); --accent-bg:var(--blue-bg); --accent-bd:var(--blue-bd);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--chalk);font-family:'Crimson Pro',Georgia,serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(91,155,213,.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(91,155,213,.018) 1px,transparent 1px);
  background-size:52px 52px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:760px;padding:0 16px 40px}

/* ══ HEADER ══ */
header{text-align:center;padding:24px 0 14px;border-bottom:1px solid var(--border2);margin-bottom:16px}
.logo{font-family:'IM Fell English',serif;font-size:2.4rem;letter-spacing:.05em}
.logo .acc{color:var(--accent)}
.tagline{font-style:italic;color:var(--chalk-dim);font-size:.88rem;margin-top:2px}
.stats-row{display:flex;justify-content:center;gap:5px;margin-top:11px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--chalk-dim)}
.chip .v{color:var(--chalk);font-size:.78rem;font-weight:700}
.chip.pts .v{color:var(--yellow)}
.chip.str .v{color:#ff8c42}

/* ══ MODE SELECTOR ══ */
.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.mode-btn{
  background:var(--surface);border:2px solid var(--border2);
  border-radius:var(--r);padding:13px 16px;cursor:pointer;
  transition:all .18s;text-align:left;position:relative;overflow:hidden
}
.mode-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.mode-btn.active{border-color:var(--accent)!important;background:var(--accent-bg)!important}
.mode-btn.math-f  {--accent:var(--blue);--accent-bg:var(--blue-bg)}
.mode-btn.math-t  {--accent:var(--purple);--accent-bg:var(--purple-bg)}
.mode-btn.phys-f  {--accent:var(--orange);--accent-bg:var(--orange-bg)}
.mode-btn.phys-t  {--accent:var(--green);--accent-bg:var(--green-bg)}
.mode-btn.math-f.active{box-shadow:0 0 20px rgba(91,155,213,.15)}
.mode-btn.math-t.active{box-shadow:0 0 20px rgba(155,127,212,.15)}
.mode-btn.phys-f.active{box-shadow:0 0 20px rgba(212,118,59,.15)}
.mode-btn.phys-t.active{box-shadow:0 0 20px rgba(61,186,119,.15)}
.mb-icon{font-size:1.5rem;margin-bottom:5px}
.mb-title{font-family:'IM Fell English',serif;font-size:1.1rem;color:var(--chalk)}
.mb-sub{font-size:.75rem;color:var(--chalk-dim);margin-top:2px;font-style:italic}
.mb-count{position:absolute;top:10px;right:12px;font-family:'JetBrains Mono',monospace;
  font-size:.6rem;color:var(--chalk-dim);background:var(--border2);
  border-radius:10px;padding:2px 7px}
.mb-active-dot{position:absolute;top:10px;right:12px;width:8px;height:8px;
  border-radius:50%;background:var(--accent);display:none}
.mode-btn.active .mb-active-dot{display:block}
.mode-btn.active .mb-count{display:none}

/* ══ PROGRESS ══ */
.prog-wrap{margin-bottom:14px}
.prog-bg{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);background:var(--accent)}
.prog-row{display:flex;justify-content:space-between;align-items:center;
  font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--chalk-dim)}
.adots{display:flex;gap:5px}
.ad{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .35s}
.ad.ok{background:var(--green)}
.ad.bad{background:var(--red)}
.ad.next{background:var(--accent);box-shadow:0 0 7px var(--accent)}

/* ══ FORMULA HERO ══ */
.hero{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);
  padding:28px 22px 18px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.7}
.hero-lbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--chalk-dim);margin-bottom:14px}
.hero-formula{min-height:56px;display:flex;align-items:center;justify-content:center}
.hero-formula .katex{font-size:1.9em}
.qmark{font-family:'IM Fell English',serif;font-size:3.2rem;color:var(--border2);
  animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.6;transform:scale(1.05)}}
.clue-strip{margin-top:13px;background:var(--surface2);border-radius:var(--rs);
  padding:9px 13px;text-align:left;font-size:.84rem;line-height:1.55;color:var(--chalk-dim)}
.clue-line{display:flex;align-items:flex-start;gap:7px;margin-bottom:3px}
.clue-line:last-child{margin-bottom:0}
.clue-ico{flex-shrink:0;font-size:.88rem;margin-top:1px}
.clue-txt{flex:1}

/* ══ CATEGORY TILES ══ */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-lbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--chalk-dim)}
.sec-sub{font-size:.7rem;color:var(--chalk-dim);font-style:italic}
.cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:16px}
.ct{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);
  padding:11px 13px 8px;position:relative;overflow:hidden;min-height:64px;
  transition:all .18s;cursor:pointer}
.ct:not(.locked):hover{border-color:var(--accent);background:var(--surface2);
  transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.25)}
.ct.locked{cursor:default}
.ct-nm{font-family:'JetBrains Mono',monospace;font-size:.53rem;letter-spacing:.09em;
  text-transform:uppercase;color:var(--chalk-dim);margin-bottom:4px}
.ct-val{font-size:.88rem;font-weight:600;color:var(--chalk);line-height:1.2}
.ct-val.masked{color:transparent;background:var(--border2);border-radius:3px;user-select:none}
.ct-ico{position:absolute;top:8px;right:9px;font-size:.85rem;opacity:.22}
.ct-cost{position:absolute;bottom:5px;right:7px;background:var(--accent-bg);
  border:1px solid var(--accent-bd);border-radius:3px;padding:1px 5px;
  font-family:'JetBrains Mono',monospace;font-size:.49rem;color:var(--accent)}

/* ══ HISTORY ══ */
.hist-wrap{margin-bottom:14px}
.h-item{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;animation:slideUp .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.h-hd{display:flex;align-items:center;gap:8px;padding:8px 12px 7px;border-bottom:1px solid var(--border)}
.h-tex{flex-shrink:0;max-width:200px;overflow:hidden}
.h-tex .katex{font-size:1em}
.h-nm{flex:1;font-size:.78rem;font-style:italic;color:var(--chalk-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-badge{font-family:'JetBrains Mono',monospace;font-size:.63rem;padding:2px 7px;border-radius:4px;flex-shrink:0}
.h-badge.win{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.h-badge.miss{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.hcats{display:grid;grid-template-columns:repeat(6,1fr)}
.hc{padding:7px 6px;border-right:1px solid var(--border)}
.hc:last-child{border-right:none}
.hc.correct{background:var(--green-bg)}
.hc.partial{background:var(--yellow-bg)}
.hc.wrong{background:var(--red-bg)}
.hc-lbl{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hc.correct .hc-lbl{color:var(--green)}
.hc.partial .hc-lbl{color:var(--yellow)}
.hc.wrong   .hc-lbl{color:var(--red)}
.hc-val{font-size:.7rem;line-height:1.2;word-break:break-word}
.hc.correct .hc-val{color:var(--chalk)}
.hc.partial .hc-val{color:var(--chalk-mid)}
.hc.wrong   .hc-val{color:var(--red)}
.arr{font-weight:800}

/* ══ RESULT ══ */
.result{border-radius:var(--r);padding:24px 20px;text-align:center;margin-bottom:14px;
  animation:fadeUp .4s cubic-bezier(.34,1.2,.64,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result.win{background:var(--green-bg);border:1px solid var(--green-bd)}
.result.lose{background:var(--red-bg);border:1px solid var(--red-bd)}
.r-em{font-size:2.6rem;margin-bottom:7px;animation:pop .5s cubic-bezier(.34,1.7,.64,1)}
@keyframes pop{from{transform:scale(.3)}to{transform:scale(1)}}
.r-title{font-family:'IM Fell English',serif;font-size:1.7rem;margin-bottom:4px}
.r-sub{color:var(--chalk-dim);font-size:.86rem;margin-bottom:10px}
.r-formula{margin:11px 0 3px}
.r-formula .katex{font-size:1.7em}
.r-name{font-style:italic;color:var(--chalk-dim);font-size:.9rem;margin-bottom:6px}
.r-author{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent);
  background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:5px;
  display:inline-block;padding:2px 9px;margin-bottom:11px}
.r-score{font-family:'JetBrains Mono',monospace;font-size:1.35rem;color:var(--yellow);font-weight:700;margin-bottom:12px}
.r-fact{background:var(--surface2);border-radius:var(--rs);padding:11px 14px;
  font-size:.86rem;color:var(--chalk-mid);line-height:1.6;font-style:italic;
  margin-bottom:14px;text-align:left}
.share-grid{font-family:'JetBrains Mono',monospace;font-size:1.2rem;
  background:var(--surface2);border-radius:var(--rs);padding:10px 14px;
  margin-bottom:13px;line-height:1.8;border:1px solid var(--border2)}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn{border:none;border-radius:var(--rs);padding:10px 20px;font-family:'Crimson Pro',serif;
  font-size:1rem;cursor:pointer;transition:all .15s;font-weight:600}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--surface3);color:var(--chalk);border:1px solid var(--border2)}
.btn:hover{opacity:.83;transform:translateY(-1px)}

/* ══ GUESS SELECTOR ══ */
.guess-wrap{margin-bottom:0}
.search-box{position:relative;margin-bottom:7px}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--rs);padding:11px 14px 11px 38px;color:var(--chalk);
  font-family:'Crimson Pro',serif;font-size:1rem;outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--chalk-dim)}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--chalk-dim);font-size:.86rem;pointer-events:none}
.glist{display:flex;flex-direction:column;gap:4px;max-height:290px;overflow-y:auto;padding-right:3px}
.glist::-webkit-scrollbar{width:3px}
.glist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.gb{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);
  padding:9px 12px;color:var(--chalk);text-align:left;cursor:pointer;
  display:grid;grid-template-columns:130px 1fr auto;align-items:center;gap:8px;
  transition:all .13s}
.gb:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(2px)}
.gb-tex .katex{font-size:.95em}
.gb-nm{font-size:.8rem;color:var(--chalk-mid);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gb-tag{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--accent);
  background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:3px;
  padding:2px 5px;white-space:nowrap}

/* ══ HOW TO ══ */
.how-wrap{margin-bottom:14px}
.how-btn{width:100%;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--rs);padding:9px 14px;color:var(--chalk-mid);
  font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:all .15s}
.how-btn:hover{border-color:var(--accent)}
.how-btn .chev{transition:transform .25s}
.how-btn.open .chev{transform:rotate(180deg)}
.how-body{background:var(--surface);border:1px solid var(--border2);border-top:none;
  border-radius:0 0 var(--rs) var(--rs);padding:12px 14px;font-size:.86rem;
  color:var(--chalk-dim);line-height:1.65;display:none}
.how-body.open{display:block}
.leg{display:flex;gap:12px;margin-top:7px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:.77rem}
.ldot{width:10px;height:10px;border-radius:2px}

/* ══ TOAST ══ */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);
  background:var(--surface3);color:var(--chalk);border:1px solid var(--border2);
  font-family:'JetBrains Mono',monospace;font-size:.74rem;padding:8px 16px;
  border-radius:18px;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s;
  opacity:0;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.good{border-color:var(--green-bd);color:var(--green)}
.toast.warn{border-color:var(--yellow-bd);color:var(--yellow)}

@media(max-width:580px){
  .hcats{grid-template-columns:repeat(3,1fr)}
  .hc:nth-child(3){border-right:none}
  .hc:nth-child(4){border-top:1px solid var(--border)}
  .cats-grid{grid-template-columns:repeat(2,1fr)}
  .gb{grid-template-columns:90px 1fr}
  .gb-tag{display:none}
  .mode-selector{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">For<span class="acc">mul</span>dle</div>
  <div class="tagline">Devinez formules &amp; théorèmes — mathématiques &amp; physique</div>
  <div class="stats-row">
    <div class="chip str">🔥 <span class="v" id="s-str">0</span></div>
    <div class="chip">✅ <span class="v" id="s-win">0</span></div>
    <div class="chip">🎮 <span class="v" id="s-play">0</span></div>
    <div class="chip pts">⭐ <span class="v" id="s-pts">0</span> pts</div>
  </div>
</header>
<div id="area"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
//  HOW TO ADD FORMULAS
//  ───────────────────
//  Chaque formule suit ce schéma exact. Copiez un bloc existant,
//  modifiez les champs, et ajoutez-le au bon tableau :
//
//    MATH_FORMULAS   → formules mathématiques (analyse, algèbre, géom…)
//    MATH_THEOREMS   → théorèmes mathématiques (avec preuve/résultat)
//    PHYS_FORMULAS   → formules physiques (méca, EM, thermo, quantique…)
//    PHYS_THEOREMS   → théorèmes/lois physiques (énoncer un résultat)
//
//  Champs obligatoires :
//    latex      : string  — code KaTeX de la formule
//    name       : string  — nom complet
//    author     : string  — auteur(s)
//    vars       : number  — nombre de symboles/variables distincts
//    operation  : string  — "Égalité" | "Somme" | "Produit" | "Division" |
//                           "Dérivée" | "Dérivée partielle" | "Intégrale" |
//                           "Exponentielle" | "Racine" | "Inégalité" |
//                           "Logarithme" | "Rotationnel" | "Divergence" |
//                           "Gradient" | "Limite" | "Équivalence"
//    constants  : string  — constante notable, ex. "π" ou "Aucune"
//    domain     : string  — domaine précis
//    era        : string  — une des clés ERA_ORDER ci-dessous
//    complexity : number  — 1 (triviale) à 5 (recherche)
//    fact       : string  — anecdote historique (sans nom ni auteur)
//    clues      : array   — 3 indices du plus vague au plus précis
//                           (sans jamais citer le nom ni l'auteur)
// ══════════════════════════════════════════════════════════════════════

// ── ERA_ORDER (pour les flèches ordinales) ──
const ERA_ORDER = ["Antiquité","IXe siècle","XVIIe siècle","XVIIIe siècle","XIXe siècle","XXe siècle","XXIe siècle"];

// ── COMPLEXITY labels ──
const CPLX = {1:"★ Triviale",2:"★★ Lycée",3:"★★★ Prépa",4:"★★★★ Master",5:"★★★★★ Recherche"};

// ══════════════════════════════════════════════════════════════════════
//  DONNÉES — FORMULES MATHÉMATIQUES
// ══════════════════════════════════════════════════════════════════════
const MATH_FORMULAS = [
  {
    latex:"x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}",
    name:"Formule quadratique", author:"Al-Khwarizmi",
    vars:4, operation:"Racine", constants:"Aucune",
    domain:"Algèbre", era:"IXe siècle", complexity:1,
    fact:"La méthode pour résoudre ce type d'équation était connue des Babyloniens, mais sa formulation algébrique moderne vient d'un mathématicien dont le nom a donné 'algorithme'.",
    clues:["Elle donne les solutions d'un type d'équation polynomial de degré 2.","Elle contient un discriminant qui détermine le nombre de solutions réelles.","Son auteur a donné son nom à un concept central de l'informatique."]
  },
  {
    latex:"e^{i\\theta} = \\cos\\theta + i\\sin\\theta",
    name:"Formule d'Euler", author:"Euler",
    vars:3, operation:"Exponentielle", constants:"e",
    domain:"Analyse complexe", era:"XVIIIe siècle", complexity:3,
    fact:"Cette formule est le fondement du traitement du signal moderne : elle permet de représenter toute oscillation comme la partie réelle d'une exponentielle complexe.",
    clues:["Elle relie l'exponentielle à deux fonctions trigonométriques.","Elle est indispensable pour les calculs en électronique et traitement du signal.","Elle généralise l'exponentielle aux nombres complexes."]
  },
  {
    latex:"e^{i\\pi}+1=0",
    name:"Identité d'Euler", author:"Euler",
    vars:5, operation:"Exponentielle", constants:"e, π",
    domain:"Analyse complexe", era:"XVIIIe siècle", complexity:3,
    fact:"Souvent élue plus belle formule des mathématiques. Elle réunit dans une seule égalité les cinq constantes considérées comme les plus fondamentales.",
    clues:["Cette formule ne contient aucune variable — uniquement des constantes.","Elle réunit cinq des symboles les plus importants des mathématiques.","C'est un cas particulier d'une formule plus générale reliant exponentielle et trigonométrie."]
  },
  {
    latex:"\\frac{d}{dx}\\int_a^x f(t)\\,dt = f(x)",
    name:"Théorème fondamental du calcul", author:"Newton / Leibniz",
    vars:3, operation:"Dérivée", constants:"Aucune",
    domain:"Analyse", era:"XVIIe siècle", complexity:3,
    fact:"Ce théorème relie deux opérations qui semblaient sans rapport. La dispute sur sa paternité est l'une des plus virulentes de l'histoire des mathématiques.",
    clues:["Il relie deux opérations fondamentales de l'analyse qui sont inverses l'une de l'autre.","Il permet de calculer des intégrales sans revenir aux sommes de Riemann.","Deux mathématiciens se le disputèrent simultanément au XVIIe siècle."]

//  CATÉGORIES (communes à tous les modes)
// ══════════════════════════════════════════════════════════════════════
const CATS = [
  {key:"vars",      label:"Nb. symboles",   icon:"🔢", ordinal:true},
  {key:"operation", label:"Opération",      icon:"⚙️"},
  {key:"constants", label:"Constante",      icon:"🌟"},
  {key:"domain",    label:"Domaine",        icon:"📐"},
  {key:"era",       label:"Époque",         icon:"🕰️", ordinal:true},
  {key:"complexity",label:"Complexité",     icon:"⚡", ordinal:true},
];

function catDisplay(f, key) {
  if (key==="complexity") return CPLX[f.complexity];
  if (key==="vars")       return f.vars+" symbole"+(f.vars>1?"s":"");
  return f[key];
}
function ordinalVal(f, key) {
  if (key==="era")        return ERA_ORDER.indexOf(f.era);
  if (key==="complexity") return f.complexity;
  if (key==="vars")       return f.vars;
  return null;
}
function catStatus(g, key, target) {
  const gv = key==="complexity"?g.complexity:key==="vars"?g.vars:g[key];
  const tv = key==="complexity"?target.complexity:key==="vars"?target.vars:target[key];
  if (String(gv)===String(tv)) return "correct";
  if (CATS.find(c=>c.key===key)?.ordinal) return "wrong";
  const gw=String(gv).toLowerCase().split(/[\s\/\-\(\)]+/);
  const tw=String(tv).toLowerCase().split(/[\s\/\-\(\)]+/);
  if (gw.some(w=>tw.includes(w)&&w.length>3)) return "partial";
  return "wrong";
}
function arrowFor(g, key, target) {
  if (!CATS.find(c=>c.key===key)?.ordinal) return "";
  const gi=ordinalVal(g,key), ti=ordinalVal(target,key);
  if (gi===null||ti===null||gi===ti) return "";
  return gi<ti?"↑":"↓";
}

let ST = {
  mode:"math-f",
  target:null, guesses:[], maxGuesses:7,
  revealedCats:new Set(), gameOver:false, won:false,
  filter:"", roundScore:0, howOpen:false,
  stats:{}  // keyed by mode
};
for (const m in MODES) ST.stats[m]={wins:0,played:0,streak:0,totalScore:0};

function loadStats() {
  try {
    const s=JSON.parse(localStorage.getItem("formuldle_v5")||"{}");
    for (const m in MODES) {
      if (s[m]) ST.stats[m]={wins:s[m].wins||0,played:s[m].played||0,streak:s[m].streak||0,totalScore:s[m].totalScore||0};
    }
  } catch(_){}
}
function saveStats() { localStorage.setItem("formuldle_v5",JSON.stringify(ST.stats)); }

function modeData() { return MODES[ST.mode].data; }
function modeStats() { return ST.stats[ST.mode]; }

function setMode(m) {
  ST.mode=m;
  ST.guesses=[]; ST.revealedCats=new Set();
  ST.gameOver=false; ST.won=false; ST.filter=""; ST.roundScore=0;
  pickFormula();
  // Update CSS accent
  const mo=MODES[m];
  document.documentElement.style.setProperty("--accent",mo.accent);
  document.documentElement.style.setProperty("--accent-bg",mo.accentBg);
  document.documentElement.style.setProperty("--accent-bd",mo.accentBd);
  render();
}

function pickFormula() {
  const data=modeData();
  const seed=Math.floor(Date.now()/86400000);
  ST.target=data[seed%data.length];
}

// ══════════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════════════════════
function makeGuess(idx) {
  if (ST.gameOver) return;
  const g=modeData()[idx];
  if (ST.guesses.includes(g)) return;
  ST.guesses.push(g);
  const ms=modeStats();
  if (g===ST.target) {
    ST.gameOver=true; ST.won=true;
    ST.roundScore=Math.max(50,1000-(ST.guesses.length-1)*130-ST.revealedCats.size*180);
    ms.wins++; ms.played++; ms.streak++; ms.totalScore+=ST.roundScore;
    saveStats(); showToast("+"+ST.roundScore+" pts 🎉","good");
  } else if (ST.guesses.length>=ST.maxGuesses) {
    ST.gameOver=true; ms.played++; ms.streak=0; saveStats();
  }
  render();
}

function revealCat(key) {
  if (ST.gameOver||ST.revealedCats.has(key)) return;
  if (ST.guesses.length+ST.revealedCats.size>=ST.maxGuesses-1) { showToast("Plus assez de tentatives !","warn"); return; }
  ST.revealedCats.add(key); showToast("Indice révélé — −180 pts","warn"); render();
}

function newGame() {
  const data=modeData(); const cur=ST.target; let pick;
  do { pick=data[Math.floor(Math.random()*data.length)]; } while(pick===cur&&data.length>1);
  ST.target=pick; ST.guesses=[]; ST.revealedCats=new Set();
  ST.gameOver=false; ST.won=false; ST.filter=""; ST.roundScore=0;
  render();
}

function toggleHow() {
  ST.howOpen=!ST.howOpen;
  document.querySelector(".how-btn")?.classList.toggle("open",ST.howOpen);
  document.querySelector(".how-body")?.classList.toggle("open",ST.howOpen);
}

function buildShare() {
  const ic={correct:"🟩",partial:"🟨",wrong:"🟥"};
  return ST.guesses.map(g=>CATS.map(c=>ic[catStatus(g,c.key,ST.target)]).join("")).join("\n");
}
function copyShare() {
  const t=`Formuldle [${MODES[ST.mode].label}] — ${ST.guesses.length}/${ST.maxGuesses}\n\n${buildShare()}`;
  navigator.clipboard.writeText(t).then(()=>showToast("Copié !","good"));
}

let _tt;
function showToast(msg,type="") {
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show "+(type||"");
  clearTimeout(_tt); _tt=setTimeout(()=>t.className="toast",2400);
}

function tex(s) {
  try { return katex.renderToString(s,{throwOnError:false,displayMode:false}); } catch(_){return s;}
}

function clueHtml() {
  const wrongCount=ST.guesses.filter(g=>g!==ST.target).length;
  const toShow=ST.target.clues.slice(0,wrongCount);
  if (!toShow.length) return `<div class="clue-strip"><div class="clue-line">
    <span class="clue-ico">💭</span>
    <span class="clue-txt" style="font-style:italic">Un indice apparaîtra après votre première tentative ratée…</span>
  </div></div>`;
  return `<div class="clue-strip">${toShow.map((c,i)=>`<div class="clue-line">
    <span class="clue-ico">${["💡","🔍","🎯"][i]}</span>
    <span class="clue-txt">${c}</span>
  </div>`).join("")}</div>`;
}

  const area=document.getElementById("area");

  document.getElementById("s-win").textContent  = ms.wins;
  document.getElementById("s-play").textContent = ms.played;
  document.getElementById("s-pts").textContent  = ms.totalScore;

  const data=modeData();
  const remain=ST.maxGuesses-ST.guesses.length;
  const pct=(ST.guesses.length/ST.maxGuesses)*100;
  let h="";

  /* MODE SELECTOR */
  h+=`<div class="mode-selector">`;
  for (const [id,mo] of Object.entries(MODES)) {
    h+=`<div class="mode-btn ${id}${ST.mode===id?" active":""}" onclick="setMode('${id}')">

      <div class="mb-title">${mo.label}</div>
      <div class="mb-sub">${mo.data.length} ${id.endsWith("-t")?"théorèmes":"formules"}</div>
      <div class="mb-count">${mo.data.length}</div>
      <div class="mb-active-dot"></div>
    </div>`;
  }
  h+=`</div>`;

  /* HOW TO */
  h+=`<div class="how-wrap">
    <button class="how-btn ${ST.howOpen?"open":""}" onclick="toggleHow()">
      <span>📖 Comment jouer</span><span class="chev">▾</span>
    </button>
    <div class="how-body ${ST.howOpen?"open":""}">
      Choisissez une formule dans la liste. Chaque tentative révèle les 6 catégories :<br>
      <div class="leg">
        <div class="leg-i"><div class="ldot" style="background:var(--green-bg);border:1px solid var(--green-bd)"></div><b style="color:var(--green)">Vert</b> = correct</div>
        <div class="leg-i"><div class="ldot" style="background:var(--yellow-bg);border:1px solid var(--yellow-bd)"></div><b style="color:var(--yellow)">Jaune</b> = mot commun</div>
        <div class="leg-i"><div class="ldot" style="background:var(--red-bg);border:1px solid var(--red-bd)"></div><b style="color:var(--red)">Rouge</b> = faux</div>
      </div><br>
      Pour <b>Époque</b>, <b>Complexité</b> et <b>Nb. de symboles</b> : une flèche <b>↑↓</b> indique si la cible est au-dessus ou en dessous.<br>
      Les <b>indices</b> se débloquent progressivement (sans jamais citer le nom ni l'auteur).<br>
      Cliquez une catégorie pour la révéler immédiatement (−1 essai, −180 pts).
    </div>
  </div>`;

  /* PROGRESS */
  const dots=Array.from({length:ST.maxGuesses},(_,i)=>{
    if (i<ST.guesses.length) return `<span class="ad ${ST.guesses[i]===ST.target?"ok":"bad"}"></span>`;
    if (i===ST.guesses.length&&!ST.gameOver) return `<span class="ad next"></span>`;
    return `<span class="ad"></span>`;
  }).join("");
  h+=`<div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-row"><span>${ST.guesses.length}/${ST.maxGuesses}</span><span class="adots">${dots}</span><span>${remain} restante${remain>1?"s":""}</span></div>
  </div>`;

  /* HERO */
  h+=`<div class="hero">
    <div class="hero-lbl">Formule à deviner — ${MODES[ST.mode].label}</div>
    <div class="hero-formula">${ST.gameOver?tex(ST.target.latex):`<span class="qmark">?</span>`}</div>

  h+=`<div class="sec-hd">

      ${can?`<div class="ct-cost">−1 essai</div>`:""}

  }
  h+=`</div>`;

  /* RESULT */
  if (ST.gameOver) {
    if (ST.won) {
      h+=`<div class="result win">
        <div class="r-em">🎉</div>
        <div class="r-title">Bravo !</div>
        <div class="r-sub">Trouvé en <b>${ST.guesses.length}</b> tentative${ST.guesses.length>1?"s":""}</div>
        <div class="r-formula">${tex(ST.target.latex)}</div>
        <div class="r-name">${ST.target.name}</div>
        <div class="r-author">— ${ST.target.author}</div>
        <div class="r-score">+${ST.roundScore} pts</div>
        <div class="r-fact">${ST.target.fact}</div>
        <div class="share-grid">${buildShare()}</div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="copyShare()">📋 Partager</button>
          <button class="btn btn-s" onclick="newGame()">Nouvelle partie →</button>
        </div>
      </div>`;
    } else {
      h+=`<div class="result lose">
        <div class="r-em">📚</div>
        <div class="r-title">Pas cette fois…</div>
        <div class="r-sub">La formule était :</div>
        <div class="r-formula">${tex(ST.target.latex)}</div>
        <div class="r-name">${ST.target.name}</div>
        <div class="r-author">— ${ST.target.author}</div>
        <div class="r-fact">${ST.target.fact}</div>
        <div class="btn-row"><button class="btn btn-p" onclick="newGame()">Réessayer →</button></div>
      </div>`;
    }
  }

  /* HISTORY */
  if (ST.guesses.length>0) {
    h+=`<div class="hist-wrap"><div class="sec-lbl" style="margin-bottom:8px">Tentatives</div>`;
    for (const g of ST.guesses) {
      const win=g===ST.target;
      h+=`<div class="h-item">
        <div class="h-hd">
          <div class="h-tex">${tex(g.latex)}</div>
          <div class="h-nm">${g.name}</div>
          <div class="h-badge ${win?"win":"miss"}">${win?"✓ Correct":"✗ Raté"}</div>
        </div>
        <div class="hcats">`;
      for (const cat of CATS) {
        const st=catStatus(g,cat.key,ST.target);
        const arr=st!=="correct"?arrowFor(g,cat.key,ST.target):"";
        h+=`<div class="hc ${st}">
          <div class="hc-lbl">${cat.icon} ${cat.label}</div>
          <div class="hc-val">${catDisplay(g,cat.key)}${arr?` <span class="arr">${arr}</span>`:""}</div>
        </div>`;
      }
      h+=`</div></div>`;
    }
    h+=`</div>`;
  }

  /* GUESS SELECTOR */
  if (!ST.gameOver) {
    const guessed=new Set(ST.guesses);
    const q=ST.filter.toLowerCase();
    const filtered=data.filter(f=>{
      if (guessed.has(f)) return false;
      return !q||f.name.toLowerCase().includes(q)||f.domain.toLowerCase().includes(q)||f.operation.toLowerCase().includes(q);
    });
    h+=`<div class="guess-wrap">
      <div class="sec-hd">
        <span class="sec-lbl">Choisissez</span>
        <span class="sec-sub">${data.length-guessed.size} disponibles</span>
      </div>
      <div class="search-box">
        <span class="s-ico">🔍</span>
        <input id="sf" type="text" placeholder="Filtrer par nom ou domaine…"
          value="${ST.filter.replace(/"/g,"&quot;")}" oninput="onFilter(this.value)">
      </div>
      <div class="glist">`;
    for (const f of filtered) {
      h+=`<button class="gb" onclick="makeGuess(${data.indexOf(f)})">
        <div class="gb-tex">${tex(f.latex)}</div>
        <div class="gb-nm">${f.name}</div>
        <div class="gb-tag">${f.domain}</div>
      </button>`;
    }
    if (!filtered.length) h+=`<div style="padding:12px;color:var(--chalk-dim);font-style:italic">Aucun résultat.</div>`;
    h+=`</div></div>`;
  }

  area.innerHTML=h;
  if (!ST.gameOver&&ST.filter) {
    const sf=document.getElementById("sf");
    if (sf){sf.focus();sf.setSelectionRange(ST.filter.length,ST.filter.length);}
  }
}

function onFilter(v) {
  ST.filter=v; render();
  const sf=document.getElementById("sf");
  if (sf){sf.focus();sf.setSelectionRange(v.length,v.length);}
}

// Init
loadStats();
// Set initial accent
const mo=MODES[ST.mode];
document.documentElement.style.setProperty("--accent",mo.accent);
document.documentElement.style.setProperty("--accent-bg",mo.accentBg);
document.documentElement.style.setProperty("--accent-bd",mo.accentBd);
pickFormula();
render();
</script>
</body>
</html>
