<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formuldle</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
:root {
  --bg: #0d0f18;
  --surface: #161925;
  --surface2: #1f2335;
  --surface3: #252a3d;
  --chalk: #e8e4d9;
  --chalk-dim: #7a7669;
  --chalk-mid: #b8b3a6;
  --green: #3dba77;
  --green-bg: rgba(61,186,119,0.10);
  --yellow: #d4a843;
  --yellow-bg: rgba(212,168,67,0.10);
  --red: #e05252;
  --red-bg: rgba(224,82,82,0.10);
  --blue: #5b9bd5;
  --blue-bg: rgba(91,155,213,0.10);
  --border: #252a3d;
  --border2: #2e3450;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--chalk);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(91,155,213,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(91,155,213,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  width: 100%; max-width: 720px;
  padding: 0 16px 60px;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 32px 0 18px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 22px;
}
.logo {
  font-family: 'IM Fell English', serif;
  font-size: 2.8rem;
  letter-spacing: 0.05em;
}
.logo .accent { color: var(--blue); }
.tagline { font-style: italic; color: var(--chalk-dim); font-size: 0.92rem; margin-top: 3px; }
.score-bar {
  display: flex; justify-content: center; gap: 28px;
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--chalk-dim);
}
.score-bar b { color: var(--chalk); font-weight: 700; font-size: 0.85rem; }
.score-bar .pts { color: var(--yellow); }

/* ── FORMULA CARD ── */
.formula-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px 24px 20px;
  text-align: center;
  margin-bottom: 18px;
  position: relative; overflow: hidden;
}
.formula-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0.5;
}
.formula-card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--chalk-dim); margin-bottom: 16px;
}
.formula-display {
  font-size: 1.6rem; min-height: 3.8rem;
  display: flex; align-items: center; justify-content: center;
  color: var(--chalk);
}
.formula-display .katex { font-size: 1.5em; }
.formula-question-mark {
  font-family: 'IM Fell English', serif;
  font-size: 3.2rem; color: var(--border2);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

/* Attempt dots */
.attempt-track {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-top: 14px;
}
.adot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--blue); border: 1px solid transparent;
  transition: all .3s;
}
.adot.used-ok  { background: var(--green); }
.adot.used-bad { background: var(--red); }
.adot.used-empty { background: var(--border2); border-color: var(--border2); }
.attempt-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--chalk-dim); margin-left: 8px;
}

/* ── TARGET CATEGORIES (top reveal panel) ── */
.cats-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--chalk-dim); margin-bottom: 10px;
}
.cats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 18px;
}
.cat-tile {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all .18s;
  position: relative; overflow: hidden;
  min-height: 68px;
}
.cat-tile:hover:not(.locked) {
  border-color: var(--blue);
  background: var(--surface2);
  transform: translateY(-1px);
}
.cat-tile.locked { cursor: default; }
.cat-tile-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--chalk-dim); margin-bottom: 5px;
}
.cat-tile-val {
  font-size: 0.92rem; font-weight: 600; color: var(--chalk);
  line-height: 1.25;
}
.cat-tile-val.masked {
  color: transparent; background: var(--border2);
  border-radius: 3px; user-select: none;
}
.cat-tile-icon { position: absolute; top: 8px; right: 10px; font-size: 0.95rem; opacity: 0.35; }
.cat-tile-hint { font-size: 0.65rem; color: var(--blue); margin-top: 3px; opacity: .8; }
.cost-badge {
  position: absolute; bottom: 6px; right: 8px;
  background: var(--blue-bg); border: 1px solid var(--blue);
  border-radius: 4px; padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.55rem; color: var(--blue);
}

/* ── HISTORY ── */
.history-section { margin-bottom: 18px; }
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--chalk-dim); margin-bottom: 8px;
}
.history-item {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  animation: slideIn .28s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

.history-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px 7px;
  border-bottom: 1px solid var(--border);
}
.history-formula-tex {
  font-size: 1.0rem;
  flex-shrink: 0;
  max-width: 180px;
  overflow: hidden;
}
.history-formula-tex .katex { font-size: 1.1em; }
.history-guess-name {
  flex: 1; font-size: 0.8rem; font-style: italic; color: var(--chalk-dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.history-score-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; padding: 2px 7px;
  border-radius: 5px; flex-shrink: 0;
}
.history-score-badge.win  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.history-score-badge.miss { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red); }

.hcats {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 0;
}
.hcat {
  padding: 7px 8px;
  border-right: 1px solid var(--border);
}
.hcat:last-child { border-right: none; }
.hcat.correct { background: var(--green-bg); }
.hcat.partial  { background: var(--yellow-bg); }
.hcat.wrong    { background: var(--red-bg); }

.hcat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hcat.correct .hcat-label { color: var(--green); }
.hcat.partial .hcat-label { color: var(--yellow); }
.hcat.wrong   .hcat-label { color: var(--red); }

.hcat-val {
  font-size: 0.72rem; line-height: 1.2;
  word-break: break-word;
}
.hcat.correct .hcat-val { color: var(--chalk); }
.hcat.partial .hcat-val { color: var(--chalk-mid); }
.hcat.wrong   .hcat-val { color: var(--red); }

.arrow { font-weight: 700; }

/* ── RESULT PANEL ── */
.result-panel {
  border-radius: 14px; padding: 28px 24px;
  text-align: center; margin-bottom: 18px;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-panel.win  { background: var(--green-bg); border: 1px solid var(--green); }
.result-panel.lose { background: var(--red-bg);   border: 1px solid var(--red); }
.result-emoji { font-size: 2.8rem; margin-bottom: 10px; }
.result-title { font-family: 'IM Fell English', serif; font-size: 1.7rem; margin-bottom: 6px; }
.result-formula-tex { margin: 14px 0 4px; }
.result-formula-tex .katex { font-size: 1.8em; }
.result-name { font-style: italic; color: var(--chalk-dim); font-size: 0.95rem; margin-bottom: 14px; }
.result-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem; color: var(--yellow); margin-bottom: 14px;
}
.result-fact {
  background: var(--surface2); border-radius: 8px;
  padding: 12px 16px; font-size: 0.88rem; color: var(--chalk-dim);
  line-height: 1.55; font-style: italic; margin-bottom: 20px;
  text-align: left;
}
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.btn { border: none; border-radius: 8px; padding: 11px 24px; font-family: 'Crimson Pro', serif; font-size: 1rem; cursor: pointer; transition: opacity .15s; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-secondary { background: var(--surface3); color: var(--chalk); border: 1px solid var(--border2); }
.btn:hover { opacity: .82; }

/* ── GUESS AREA ── */
.guess-section { margin-bottom: 18px; }
.search-wrap { position: relative; margin-bottom: 9px; }
.search-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 11px 14px; color: var(--chalk);
  font-family: 'Crimson Pro', serif; font-size: 1rem;
  outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--blue); }
.search-input::placeholder { color: var(--chalk-dim); }

.guess-options {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 300px; overflow-y: auto; padding-right: 4px;
}
.guess-options::-webkit-scrollbar { width: 4px; }
.guess-options::-webkit-scrollbar-track { background: transparent; }
.guess-options::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.guess-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 14px;
  color: var(--chalk); text-align: left;
  cursor: pointer; transition: all .14s;
  display: flex; align-items: center; gap: 12px;
}
.guess-btn:hover { border-color: var(--blue); background: var(--surface2); }
.guess-btn-tex { min-width: 100px; flex-shrink: 0; font-size: 0.9rem; }
.guess-btn-tex .katex { font-size: 1.05em; }
.guess-btn-name { flex: 1; font-size: 0.84rem; color: var(--chalk-dim); font-style: italic; }
.guess-btn-domain {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; color: var(--blue); flex-shrink: 0;
  background: var(--blue-bg); border-radius: 4px; padding: 2px 6px;
}

/* ── HOW TO PLAY ── */
.how-to {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 18px;
  font-size: 0.87rem; color: var(--chalk-dim); line-height: 1.6;
}
.how-to h3 {
  font-family: 'JetBrains Mono', monospace; font-size: 0.63rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--chalk-mid); margin-bottom: 6px;
}
.legend { display: flex; gap: 14px; margin-top: 7px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }
.ldot { width: 11px; height: 11px; border-radius: 3px; }

/* ── BONUS TOAST ── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-60px);
  background: var(--yellow); color: #1a1400;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700;
  padding: 10px 20px; border-radius: 8px; z-index: 999;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
  opacity: 0; pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── SHARE GRID ── */
.share-grid {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem; letter-spacing: 0.08em;
  background: var(--surface2); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 14px;
  text-align: center; line-height: 1.7;
  border: 1px solid var(--border2);
}

/* responsive */
@media (max-width: 540px) {
  .hcats { grid-template-columns: repeat(3, 1fr); }
  .hcat:nth-child(3) { border-right: none; }
  .hcat:nth-child(4) { border-top: 1px solid var(--border); }
  .cats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="wrapper">

<header>
  <div class="logo">For<span class="accent">mul</span>dle</div>
  <div class="tagline">Devinez la formule — mathématiques &amp; physique</div>
  <div class="score-bar">
    <div>🔥 Série&nbsp;<b id="stat-streak">0</b></div>
    <div>✅ Victoires&nbsp;<b id="stat-wins">0</b></div>
    <div>🎮 Parties&nbsp;<b id="stat-played">0</b></div>
    <div>⭐ Score&nbsp;<b class="pts" id="stat-score">0</b></div>
  </div>
</header>

<div id="game-area"></div>

</div>

<div class="toast" id="toast"></div>



<script>
// ═══════════════════════════════════════════════════════
// DATA  —  40 formules
// ═══════════════════════════════════════════════════════
// complexity scale (for arrows):
// 1=triviale, 2=lycée, 3=prépa/licence, 4=master, 5=recherche

const FORMULAS = [
  /* ─── PHYSIQUE ─── */
  {
    latex: "E = mc^2",
    name: "Équivalence masse-énergie",
    domain: "Relativité",
    author: "Einstein",
    era: "XXe siècle",
    type: "Relation fondamentale",
    field: "Physique",
    complexity: 2,
    fact: "Publiée en 1905 dans le cadre de la relativité restreinte, cette formule montre que la masse et l'énergie sont équivalentes. Elle est à la base de la physique nucléaire et des réacteurs à fission."
  },
  {
    latex: "F = ma",
    name: "2e loi de Newton",
    domain: "Mécanique classique",
    author: "Newton",
    era: "XVIIe siècle",
    type: "Loi fondamentale",
    field: "Physique",
    complexity: 1,
    fact: "La deuxième loi du mouvement : la résultante des forces appliquées sur un objet est égale au produit de sa masse par son accélération. Fondement de la mécanique classique pendant trois siècles."
  },
  {
    latex: "F = G\\frac{m_1 m_2}{r^2}",
    name: "Loi de gravitation universelle",
    domain: "Mécanique céleste",
    author: "Newton",
    era: "XVIIe siècle",
    type: "Loi fondamentale",
    field: "Physique",
    complexity: 2,
    fact: "Newton aurait eu l'idée en observant une pomme tomber. Cette loi décrit l'attraction gravitationnelle entre deux corps massifs et permit de prédire les orbites planétaires avec une précision remarquable."
  },
  {
    latex: "i\\hbar\\frac{\\partial \\psi}{\\partial t} = \\hat{H}\\psi",
    name: "Équation de Schrödinger",
    domain: "Mécanique quantique",
    author: "Schrödinger",
    era: "XXe siècle",
    type: "Équation différentielle",
    field: "Physique",
    complexity: 5,
    fact: "L'équation centrale de la mécanique quantique, décrivant l'évolution temporelle de la fonction d'onde ψ. Son interprétation probabiliste fut au cœur d'un célèbre débat entre Einstein et Bohr."
  },
  {
    latex: "S = k_B \\ln \\Omega",
    name: "Entropie de Boltzmann",
    domain: "Physique statistique",
    author: "Boltzmann",
    era: "XIXe siècle",
    type: "Définition statistique",
    field: "Physique",
    complexity: 4,
    fact: "Cette formule est gravée sur la tombe de Boltzmann à Vienne. Elle relie l'entropie macroscopique au nombre Ω de micro-états compatibles, fondant la physique statistique."
  },
  {
    latex: "PV = nRT",
    name: "Loi des gaz parfaits",
    domain: "Thermodynamique",
    author: "Clapeyron",
    era: "XIXe siècle",
    type: "Équation d'état",
    field: "Physique",
    complexity: 2,
    fact: "Synthèse des lois de Boyle, Charles et Gay-Lussac, formulée par Clapeyron en 1834. Elle décrit le comportement idéal des gaz à basse pression et haute température."
  },
  {
    latex: "\\nabla \\times \\mathbf{B} = \\mu_0 \\mathbf{J} + \\mu_0\\varepsilon_0\\frac{\\partial \\mathbf{E}}{\\partial t}",
    name: "Équation de Maxwell-Ampère",
    domain: "Électromagnétisme",
    author: "Maxwell",
    era: "XIXe siècle",
    type: "Équation de champ",
    field: "Physique",
    complexity: 5,
    fact: "Le terme ε₀∂E/∂t, ajouté par Maxwell au travail d'Ampère, est le courant de déplacement. Il permit de prédire l'existence des ondes électromagnétiques se propageant à la vitesse de la lumière."
  },
  {
    latex: "\\nabla \\cdot \\mathbf{E} = \\frac{\\rho}{\\varepsilon_0}",
    name: "Loi de Gauss (électrostatique)",
    domain: "Électromagnétisme",
    author: "Gauss",
    era: "XIXe siècle",
    type: "Équation de champ",
    field: "Physique",
    complexity: 4,
    fact: "La première des équations de Maxwell relie la divergence du champ électrique à la densité volumique de charges. Elle est l'expression différentielle du théorème de Gauss."
  },
  {
    latex: "\\Delta x \\cdot \\Delta p \\geq \\frac{\\hbar}{2}",
    name: "Principe d'incertitude de Heisenberg",
    domain: "Mécanique quantique",
    author: "Heisenberg",
    era: "XXe siècle",
    type: "Inégalité fondamentale",
    field: "Physique",
    complexity: 4,
    fact: "Il est impossible de connaître simultanément et avec une précision arbitraire la position et la quantité de mouvement d'une particule. Ce n'est pas une limite instrumentale, mais une propriété fondamentale de la nature."
  },
  {
    latex: "E^2 = (pc)^2 + (m_0 c^2)^2",
    name: "Relation énergie-impulsion",
    domain: "Relativité",
    author: "Einstein",
    era: "XXe siècle",
    type: "Relation fondamentale",
    field: "Physique",
    complexity: 4,
    fact: "Généralisation relativiste de E=mc². Pour un photon (m₀=0), elle donne E=pc. Elle unifie masse, énergie et impulsion dans le cadre de la relativité restreinte."
  },
  {
    latex: "F = q(\\mathbf{E} + \\mathbf{v} \\times \\mathbf{B})",
    name: "Force de Lorentz",
    domain: "Électromagnétisme",
    author: "Lorentz",
    era: "XIXe siècle",
    type: "Loi fondamentale",
    field: "Physique",
    complexity: 3,
    fact: "La force subie par une charge q dans un champ électromagnétique. Le terme v×B est la force magnétique, toujours perpendiculaire à la vitesse : elle ne travaille jamais."
  },
  {
    latex: "\\lambda = \\frac{h}{p}",
    name: "Relation de De Broglie",
    domain: "Mécanique quantique",
    author: "De Broglie",
    era: "XXe siècle",
    type: "Dualité onde-corpuscule",
    field: "Physique",
    complexity: 3,
    fact: "De Broglie proposa dans sa thèse de 1924 que toute particule possède une longueur d'onde λ=h/p. Confirmée expérimentalement par Davisson et Germer en 1927, cette idée valut à De Broglie le prix Nobel."
  },

  /* ─── MATHÉMATIQUES ─── */
  {
    latex: "a^2 + b^2 = c^2",
    name: "Théorème de Pythagore",
    domain: "Géométrie euclidienne",
    author: "Pythagore",
    era: "Antiquité",
    type: "Théorème géométrique",
    field: "Mathématiques",
    complexity: 1,
    fact: "L'un des théorèmes les plus anciens, connu des Babyloniens 1000 ans avant Pythagore. Il caractérise les triangles rectangles et est à la base de toute la trigonométrie."
  },
  {
    latex: "e^{i\\pi} + 1 = 0",
    name: "Identité d'Euler",
    domain: "Analyse complexe",
    author: "Euler",
    era: "XVIIIe siècle",
    type: "Identité remarquable",
    field: "Mathématiques",
    complexity: 3,
    fact: "Souvent élue « plus belle formule des mathématiques » : elle relie les cinq constantes fondamentales e, i, π, 1 et 0 dans une seule équation d'une simplicité déconcertante."
  },
  {
    latex: "e^{i\\theta} = \\cos\\theta + i\\sin\\theta",
    name: "Formule d'Euler",
    domain: "Analyse complexe",
    author: "Euler",
    era: "XVIIIe siècle",
    type: "Formule fondamentale",
    field: "Mathématiques",
    complexity: 3,
    fact: "Fondement de toute l'analyse de Fourier et du traitement du signal. Elle permet de représenter les oscillations et rotations de façon unifiée via les exponentielles complexes."

// CATEGORIES & ORDINALS
// ═══════════════════════════════════════════════════════
const CATS = [
  { key:"domain",     label:"Domaine",      icon:"📐" },
  { key:"author",     label:"Auteur",        icon:"🧑‍🔬" },
  { key:"era",        label:"Époque",        icon:"🕰️",  ordinal:true },
  { key:"field",      label:"Matière",       icon:"🔭" },
  { key:"type",       label:"Type",          icon:"🏷️" },
  { key:"complexity", label:"Complexité",    icon:"⚡", ordinal:true },
];

const ERA_ORDER = ["Antiquité","IXe siècle","XVIIe siècle","XVIIIe siècle","XIXe siècle","XXe siècle","XXIe siècle"];
const COMPLEXITY_LABELS = {1:"★ Triviale",2:"★★ Lycée",3:"★★★ Prépa",4:"★★★★ Master",5:"★★★★★ Recherche"};

function ordinalArrow(guessVal, targetVal, order) {
  const gi = typeof guessVal === "number"
    ? guessVal
    : order.indexOf(guessVal);
  const ti = typeof targetVal === "number"
    ? targetVal
    : order.indexOf(targetVal);
  if (gi === -1 || ti === -1 || gi === ti) return "";
  return gi < ti ? "↑" : "↓";
}

function catDisplay(formula, key) {
  if (key === "complexity") return COMPLEXITY_LABELS[formula.complexity] || formula.complexity;
  return formula[key];
}

// STATE
// ═══════════════════════════════════════════════════════
let STATE = {
  target: null,
  guesses: [],
  maxGuesses: 7,
  revealedCats: new Set(),
  gameOver: false,
  won: false,
  filter: "",
  roundScore: 0,
  stats: { wins:0, played:0, streak:0, totalScore:0 },
};

// ═══════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════
function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem("formuldle_v2") || "{}");
    STATE.stats = {
      wins: s.wins||0, played: s.played||0,
      streak: s.streak||0, totalScore: s.totalScore||0
    };
  } catch(_) {}
}
function saveStats() {
  localStorage.setItem("formuldle_v2", JSON.stringify(STATE.stats));
}

// ═══════════════════════════════════════════════════════
// PICK FORMULA  (daily seed)
// ═══════════════════════════════════════════════════════
function pickFormula() {
  const seed = Math.floor(Date.now() / 86400000);
  STATE.target = FORMULAS[seed % FORMULAS.length];
  STATE.guesses = [];
  STATE.revealedCats = new Set();
  STATE.gameOver = false;
  STATE.won = false;
  STATE.filter = "";
  STATE.roundScore = 0;
}

// ═══════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════
function catStatus(guess, key) {
  const gv = key === "complexity" ? guess.complexity : guess[key];
  const tv = key === "complexity" ? STATE.target.complexity : STATE.target[key];
  if (gv === tv) return "correct";
  if (key === "complexity" || key === "era") return "wrong"; // arrows handle nearness
  // partial: shared meaningful word
  const gw = String(gv).toLowerCase().split(/[\s\/]+/);
  const tw = String(tv).toLowerCase().split(/[\s\/]+/);
  if (gw.some(w => tw.includes(w) && w.length > 3)) return "partial";
  return "wrong";
}

function computeScore(guessCount, hintsUsed) {
  const base = 1000;
  const guessPenalty = (guessCount - 1) * 120;
  const hintPenalty  = hintsUsed * 180;
  return Math.max(50, base - guessPenalty - hintPenalty);
}

function makeGuess(idx) {
  if (STATE.gameOver) return;
  const guess = FORMULAS[idx];
  if (STATE.guesses.find(g => g === guess)) return;
  STATE.guesses.push(guess);

  if (guess === STATE.target) {
    STATE.gameOver = true; STATE.won = true;
    STATE.roundScore = computeScore(STATE.guesses.length, STATE.revealedCats.size);
    STATE.stats.wins++;
    STATE.stats.played++;
    STATE.stats.streak++;
    STATE.stats.totalScore += STATE.roundScore;
    saveStats();
    showToast("+" + STATE.roundScore + " pts 🎉");
  } else if (STATE.guesses.length >= STATE.maxGuesses) {
    STATE.gameOver = true;
    STATE.stats.played++;
    STATE.stats.streak = 0;
    saveStats();
  }
  render();
}

function revealCat(key) {
  if (STATE.gameOver || STATE.revealedCats.has(key)) return;
  if (STATE.guesses.length + STATE.revealedCats.size >= STATE.maxGuesses - 1) {
    showToast("Plus assez de tentatives pour révéler !");
    return;
  }
  STATE.revealedCats.add(key);
  showToast("Indice révélé — −180 pts");
  render();
}

function newGame() {
  const cur = STATE.target;
  let pick;
  do { pick = FORMULAS[Math.floor(Math.random() * FORMULAS.length)]; }
  while (pick === cur);
  STATE.target = pick;
  STATE.guesses = [];
  STATE.revealedCats = new Set();
  STATE.gameOver = false;
  STATE.won = false;
  STATE.filter = "";
  STATE.roundScore = 0;
  render();
}

// ═══════════════════════════════════════════════════════
// SHARE
// ═══════════════════════════════════════════════════════
function buildShareGrid() {
  const icons = { correct:"🟩", partial:"🟨", wrong:"🟥" };
  return STATE.guesses.map(g => {
    return CATS.map(c => icons[catStatus(g, c.key)]).join("");
  }).join("\n");
}

function copyShare() {
  const grid = buildShareGrid();
  const text = `Formuldle — ${STATE.target.name}\n${STATE.guesses.length}/${STATE.maxGuesses} tentatives\n\n${grid}`;
  navigator.clipboard.writeText(text).then(() => showToast("Copié dans le presse-papiers !"));
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function tex(latex) {
  try {
    return katex.renderToString(latex, { throwOnError:false, displayMode:false });
  } catch(_) { return latex; }
}

function render() {
  const area = document.getElementById("game-area");

  document.getElementById("stat-streak").textContent = STATE.stats.streak;
  document.getElementById("stat-wins").textContent   = STATE.stats.wins;
  document.getElementById("stat-played").textContent = STATE.stats.played;
  document.getElementById("stat-score").textContent  = STATE.stats.totalScore;

  const remainAttempts = STATE.maxGuesses - STATE.guesses.length;
  let h = "";

  /* ── How to play ── */
  h += `<div class="how-to">
    <h3>Comment jouer</h3>
    Choisissez une formule dans la liste. Chaque tentative révèle les 6 catégories en
    <span style="color:var(--green)">vert</span> (correct),
    <span style="color:var(--yellow)">jaune</span> (proche) ou
    <span style="color:var(--red)">rouge</span> (faux).
    Pour l'<b>Époque</b> et la <b>Complexité</b>, une flèche ↑↓ indique si la cible est plus haute ou plus basse.
    Cliquez une catégorie pour révéler un indice (coûte −180 pts &amp; 1 tentative).
    <div class="legend">
      <div class="legend-item"><div class="ldot" style="background:var(--green-bg);border:1px solid var(--green)"></div>Correct</div>
      <div class="legend-item"><div class="ldot" style="background:var(--yellow-bg);border:1px solid var(--yellow)"></div>Proche</div>
      <div class="legend-item"><div class="ldot" style="background:var(--red-bg);border:1px solid var(--red)"></div>Faux</div>
    </div>
  </div>`;

  /* ── Formula card ── */
  const dotHtml = Array.from({length: STATE.maxGuesses}, (_, i) => {
    let cls = "";
    if (i < STATE.guesses.length) {
      cls = (STATE.guesses[i] === STATE.target) ? "used-ok" : "used-bad";
    } else {
      cls = "";
    }
    return `<span class="adot ${cls}"></span>`;
  }).join("");

  h += `<div class="formula-card">
    <div class="formula-card-label">Formule à deviner</div>
    <div class="formula-display">
      ${STATE.gameOver
        ? `<span>${tex(STATE.target.latex)}</span>`
        : `<span class="formula-question-mark">?</span>`}
    </div>
    <div class="attempt-track">${dotHtml}<span class="attempt-count">${remainAttempts} tentative${remainAttempts>1?"s":""} restante${remainAttempts>1?"s":""}</span></div>
  </div>`;

  /* ── Target category tiles ── */
  h += `<div class="cats-title">Indices — cliquez pour révéler (coûte 1 tentative &amp; −180 pts)</div>`;
  h += `<div class="cats-grid">`;
  for (const cat of CATS) {
    const isRevealed = STATE.revealedCats.has(cat.key) || STATE.gameOver;
    const canReveal  = !isRevealed && !STATE.gameOver &&
      (STATE.guesses.length + STATE.revealedCats.size < STATE.maxGuesses - 1);
    h += `<div class="cat-tile ${isRevealed?"locked":""}"
      onclick="${canReveal ? `revealCat('${cat.key}')` : ""}">
      <div class="cat-tile-name">${cat.label}</div>
      <div class="cat-tile-val ${isRevealed?"":"masked"}">
        ${isRevealed ? catDisplay(STATE.target, cat.key) : "???"}
      </div>
      <div class="cat-tile-icon">${cat.icon}</div>
      ${canReveal ? `<div class="cost-badge">-1 essai</div>` : ""}
    </div>`;
  }
  h += `</div>`;

  /* ── Result panel ── */
  if (STATE.gameOver) {
    if (STATE.won) {
      const grid = buildShareGrid();
      h += `<div class="result-panel win">
        <div class="result-emoji">🎉</div>
        <div class="result-title">Bravo !</div>
        <div style="color:var(--chalk-dim);font-size:.9rem">Trouvé en <b>${STATE.guesses.length}</b> tentative${STATE.guesses.length>1?"s":""}</div>
        <div class="result-formula-tex">${tex(STATE.target.latex)}</div>
        <div class="result-name">${STATE.target.name}</div>
        <div class="result-score">+${STATE.roundScore} pts</div>
        <div class="result-fact">${STATE.target.fact}</div>
        <div class="share-grid">${grid}</div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="copyShare()">📋 Partager</button>
          <button class="btn btn-secondary" onclick="newGame()">Nouvelle partie →</button>
        </div>
      </div>`;
    } else {
      h += `<div class="result-panel lose">
        <div class="result-emoji">📚</div>
        <div class="result-title">Pas cette fois…</div>
        <div style="color:var(--chalk-dim);font-size:.9rem">La formule était :</div>
        <div class="result-formula-tex">${tex(STATE.target.latex)}</div>
        <div class="result-name">${STATE.target.name}</div>
        <div class="result-fact">${STATE.target.fact}</div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="newGame()">Réessayer →</button>
        </div>
      </div>`;
    }
  }

  /* ── History ── */
  if (STATE.guesses.length > 0) {
    h += `<div class="history-section"><div class="section-label">Tentatives</div>`;
    for (const g of STATE.guesses) {
      const isWin = g === STATE.target;
      h += `<div class="history-item">
        <div class="history-header">
          <div class="history-formula-tex">${tex(g.latex)}</div>
          <div class="history-guess-name">${g.name}</div>
          <div class="history-score-badge ${isWin?"win":"miss"}">${isWin?"✓ Trouvé":"✗"}</div>
        </div>
        <div class="hcats">`;
      for (const cat of CATS) {
        const st = catStatus(g, cat.key);
        let arrowHtml = "";
        if (cat.ordinal && st !== "correct") {
          const order = cat.key === "era" ? ERA_ORDER : null;
          const gv = cat.key === "complexity" ? g.complexity : g[cat.key];
          const tv = cat.key === "complexity" ? STATE.target.complexity : STATE.target[cat.key];
          const arr = order ? ordinalArrow(gv, tv, order) : ordinalArrow(gv, tv, null);
          if (arr) arrowHtml = `<span class="arrow">${arr}</span>`;
        }
        h += `<div class="hcat ${st}">
          <div class="hcat-label">${cat.icon} ${cat.label}</div>
          <div class="hcat-val">${catDisplay(g, cat.key)} ${arrowHtml}</div>
        </div>`;
      }
      h += `</div></div>`;
    }
    h += `</div>`;
  }

  /* ── Guess selector ── */
  if (!STATE.gameOver) {
    const guessed = new Set(STATE.guesses);
    const filtered = FORMULAS.filter(f => {
      if (guessed.has(f)) return false;
      const q = STATE.filter.toLowerCase();
      return !q ||
        f.name.toLowerCase().includes(q) ||
        f.author.toLowerCase().includes(q) ||
        f.domain.toLowerCase().includes(q) ||
        f.latex.toLowerCase().includes(q);
    });

    h += `<div class="guess-section">
      <div class="section-label">Choisissez une formule (${FORMULAS.length - guessed.size} restantes)</div>
      <div class="search-wrap">
        <input class="search-input" id="search-field" type="text"
          placeholder="Rechercher par nom, auteur, domaine…"
          value="${STATE.filter.replace(/"/g,'&quot;')}"
          oninput="onFilter(this.value)">
      </div>
      <div class="guess-options">`;
    for (const f of filtered) {
      const idx = FORMULAS.indexOf(f);
      h += `<button class="guess-btn" onclick="makeGuess(${idx})">
        <div class="guess-btn-tex">${tex(f.latex)}</div>
        <div class="guess-btn-name">${f.name}</div>
        <div class="guess-btn-domain">${f.domain}</div>
      </button>`;
    }
    if (filtered.length === 0)
      h += `<div style="padding:12px;color:var(--chalk-dim);font-style:italic">Aucun résultat.</div>`;
    h += `</div></div>`;
  }

  area.innerHTML = h;

  // Restore search focus
  if (!STATE.gameOver && STATE.filter) {
    const sf = document.getElementById("search-field");
    if (sf) { sf.focus(); sf.setSelectionRange(STATE.filter.length, STATE.filter.length); }
  }
}

function onFilter(val) {
  STATE.filter = val;
  render();
  const sf = document.getElementById("search-field");
  if (sf) { sf.focus(); sf.setSelectionRange(val.length, val.length); }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
loadStats();
pickFormula();
render();
</script>
</body>
</html>
